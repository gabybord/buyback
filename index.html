function BuybackFilters({ openFilter, setOpenFilter, activeFilters, setActiveFilters, onCancel }) {

  const pick = (label, opt) => {
    const k = keys[label];
    setActiveFilters((f) => ({ ...f, [k]: f[k] === opt ? undefined : opt }));
    setOpenFilter(null);
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24 }}>
      <span style={{ color: T.textMuted, display: "inline-flex" }}>{Icons.filter(16)}</span>

        const k = keys[label];
        return <FilterChip key={label} label={label} value={activeFilters[k]} options={FILTER_OPTIONS[label]} open={openFilter === label} onClick={() => setOpenFilter(openFilter === label ? null : label)} onPick={(o) => pick(label, o)} />;

      <span style={{ color: T.textSecondary, fontSize: 13, display: "flex", gap: 6, alignItems: "center", cursor: "pointer" }}>Ordenar {Icons.arrowUp(16)}</span>

      <div style={{ flex: 1.4 }}><div style={{ color: "#fff", fontSize: 15, fontWeight: 500, marginBottom: 8 }}>{tool.name}</div><div style={{ display: "flex", gap: 6 }}>{tool.specs.map((s, i) => <Badge key={i}>{s}</Badge>)}</div></div>
      <div style={{ flex: 1, color: T.textSecondary, fontSize: 13 }}><div style={{ display: "flex", alignItems: "center", gap: 6 }}>{Icons.box(14)} {tool.storage}</div><div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>{Icons.serial(14)} {tool.serial}</div></div>
      <div style={{ flex: 1 }}><div style={{ color: T.textMuted, fontSize: 12 }}>Condición</div><div style={{ color: "#fff", fontSize: 14, marginTop: 6 }}>{tool.condition}</div></div>
    </div>
  );
}
function ConfirmModal({ countries, grouped, onClose, onEdit, onSend }) {
  const multi = countries.length > 1;
  // single país → abierto; múltiples países → todos cerrados
  const [open, setOpen] = useState(() => Object.fromEntries(countries.map((c) => [c, !multi])));
  return (
    <Overlay onClose={onClose}>
      <div style={{ display: "flex", flexDirection: "column", height: 520 }}>
        <div style={{ textAlign: "center", marginBottom: 20, flexShrink: 0 }}>
          <div style={{ color: "#fff", fontSize: 22, fontWeight: 700 }}>Cotizar buyback</div>
          <div style={{ color: T.textMuted, fontSize: 14, marginTop: 6 }}>Revisa las herramientas y confirma tu solicitud</div>
        </div>
        {multi && (
          <div style={{ background: T.infoBg, border: `1px solid ${T.info}`, borderRadius: 10, padding: "12px 16px", color: "#fff", fontSize: 13, marginBottom: 16, display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
            <span style={{ color: T.info, display: "inline-flex", flexShrink: 0 }}>{Icons.info(18)}</span> Se generará una solicitud de buyback por cada país
          </div>
        )}
        <div style={{ flex: 1, background: T.level1, borderRadius: 14, padding: 16, overflowY: "auto", marginBottom: 24 }}>
          {countries.map((c) => (
            <div key={c} style={{ marginBottom: open[c] ? 8 : 4 }}>
              <div onClick={() => setOpen((o) => ({ ...o, [c]: !o[c] }))} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 4px", cursor: "pointer" }}>
                <span style={{ fontSize: 16 }}>{FLAGS[c]}</span>
                <span style={{ color: "#fff", fontWeight: 600, fontSize: 15 }}>{c} ({grouped[c].length})</span>
                <span style={{ color: T.textMuted, marginLeft: 6, display: "inline-flex" }}>{open[c] ? Icons.chevUp(16) : Icons.chevDown(16)}</span>
              </div>
              {open[c] && <div style={{ marginTop: 8 }}>{grouped[c].map((t) => <ReviewCard key={t.id} tool={t} />)}</div>}
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 16, flexShrink: 0 }}>
          <Btn variant="outline" style={{ flex: 1 }} onClick={onEdit}>Editar buyback</Btn>
          <Btn style={{ flex: 1 }} onClick={onSend}>{multi ? `Enviar ${countries.length} solicitudes` : "Enviar solicitud"}</Btn>
        </div>
      </div>
    </Overlay>
  );
}
function SuccessModal({ countries, grouped, onClose }) {
  const multi = countries.length > 1;
  return (
    <Overlay onClose={onClose}>
      <div style={{ textAlign: "center" }}>
        <div style={{ width: 64, height: 64, borderRadius: "50%", background: `radial-gradient(circle at 35% 30%, ${T.primary}, #0c3b34)`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", color: "#fff" }}>{Icons.check(30)}</div>
        <div style={{ color: "#fff", fontSize: 22, fontWeight: 700 }}>{multi ? "Solicitudes enviadas" : "Solicitud enviada"}</div>
        <div style={{ color: T.textMuted, fontSize: 14, marginTop: 6 }}>{multi ? `Se generaron ${countries.length} solicitudes de venta de herramientas` : "Se generó 1 solicitud de venta de herramientas"}</div>
      </div>
      <div style={{ background: T.level1, borderRadius: 12, padding: 20, margin: "24px 0" }}>
        <div style={{ display: "flex", marginBottom: 16 }}>
          <div style={{ flex: 1 }}><div style={{ color: T.textMuted, fontSize: 12 }}>Cantidad de solicitudes</div><div style={{ color: "#fff", fontSize: 16, marginTop: 6 }}>{countries.length}</div></div>
          <div style={{ flex: 1 }}><div style={{ color: T.textMuted, fontSize: 12 }}>{multi ? "Países de solicitud" : "País de solicitud"}</div><div style={{ fontSize: 16, marginTop: 6 }}>{countries.map((c) => FLAGS[c]).join(" ")}</div></div>
          <div style={{ flex: 1 }}><div style={{ color: T.textMuted, fontSize: 12 }}>Tiempo estimado de respuesta</div><div style={{ color: "#fff", fontSize: 16, marginTop: 6 }}>72 horas hábiles</div></div>
        </div>
        <div style={{ background: T.infoBg, border: `1px solid ${T.info}`, borderRadius: 10, padding: "12px 16px", color: T.textSecondary, fontSize: 13, display: "flex", alignItems: "flex-start", gap: 10 }}><span style={{ color: T.info, display: "inline-flex", flexShrink: 0, marginTop: 1 }}>{Icons.info(18)}</span> Tu KAM revisará cada solicitud y te enviará una oferta por herramienta. Tendrás 72 horas para aprobarla y subir la factura correspondiente.</div>
        <div style={{ marginTop: 16 }}>
          {countries.map((c, i) => (
            <div key={c} style={{ display: "flex", paddingTop: 12, borderTop: i ? `1px solid ${T.stroke}` : "none" }}>
              <div style={{ flex: 1 }}>{i === 0 && <div style={{ color: T.textMuted, fontSize: 12, marginBottom: 4 }}>N° de buyback</div>}<div style={{ color: "#fff", fontSize: 15 }}>BBX°{12345 + i}</div></div>
              <div style={{ flex: 1 }}>{i === 0 && <div style={{ color: T.textMuted, fontSize: 12, marginBottom: 4 }}>País de solicitud</div>}<div style={{ color: "#fff", fontSize: 15 }}>{FLAGS[c]} {c}</div></div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "center" }}><Btn variant="outline" style={{ width: 320 }} onClick={onClose}>Volver a Inventario</Btn></div>
    </Overlay>
  );
}

const Row = ({ k, v }) => <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}><span style={{ color: T.textMuted }}>{k}</span><span style={{ color: "#fff" }}>{v}</span></div>;
function DetailScreen({ tool, onSell }) {
  const actions = [["Offboarding a", "Empleado", Icons.minusCircle(20)], ["Mover a", "Oficinas", Icons.warehouse(20)], ["Aplicar", "Garantía", Icons.shield(20)], ["Solicitar", "Diagnóstico", Icons.wrench(20)], ["Solicitar", "Buyback", Icons.bbx(20), true]];
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: T.bg, minWidth: 0 }}>
      <TopHeader kind="detail" />
      <div style={{ flex: 1, padding: 24, overflowY: "auto" }}>
        <div style={{ display: "flex", gap: 24 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", gap: 18, marginBottom: 24 }}>
              <div style={{ width: 100, height: 100, background: "#fff", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", color: "#0d1424" }}>{Icons.computer(48)}</div>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}><div style={{ width: 32, height: 32, borderRadius: "50%", background: T.purple }} /><div style={{ color: "#fff", fontSize: 24, fontWeight: 700 }}>{tool.name}</div><span>{FLAGS[tool.country]}</span><span style={{ marginLeft: 8, background: "#0d2b1c", color: T.primary, fontSize: 12, padding: "4px 10px", borderRadius: 20, display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: T.primary }} /> Disponible</span></div>
                <div style={{ display: "flex", gap: 6, marginTop: 12 }}>{tool.specs.map((s, i) => <Badge key={i}>{s}</Badge>)}<Badge>{tool.care}</Badge></div>
                <div style={{ color: T.primary, fontSize: 13, marginTop: 12, display: "flex", alignItems: "center", gap: 4 }}>Agregar etiqueta {Icons.plus(14)}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 14, marginBottom: 28 }}>
              {actions.map(([top, bottom, icon, hl]) => (
                <div key={bottom} onClick={() => hl && onSell(tool)} style={{ flex: 1, background: T.level1, borderRadius: 12, padding: "20px 8px", textAlign: "center", cursor: hl ? "pointer" : "default", border: hl ? `1px solid ${T.primary}66` : "1px solid transparent" }}>
                  <div style={{ marginBottom: 8, display: "flex", justifyContent: "center", color: hl ? T.primary : T.textSecondary }}>{icon}</div><div style={{ color: T.textSecondary, fontSize: 13 }}>{top}</div><div style={{ color: "#fff", fontSize: 14, fontWeight: 600 }}>{bottom}</div>
                </div>
              ))}
            </div>
            <div style={{ color: "#fff", fontSize: 15, fontWeight: 600, marginBottom: 14 }}>Historial de la herramienta</div>
            <div style={{ background: T.level1, borderRadius: 12, padding: 20, display: "flex", gap: 16, alignItems: "center" }}>
              <div style={{ width: 40, height: 40, borderRadius: 8, background: "#0d1424", display: "flex", alignItems: "center", justifyContent: "center", color: T.textSecondary }}>{Icons.warehouse(20)}</div>
              <div style={{ flex: 1 }}><div style={{ color: "#fff", fontSize: 14, fontWeight: 600 }}>.bord Warehouse</div><div style={{ color: T.textMuted, fontSize: 12, marginTop: 4 }}>Fecha de entrega 12/11/2023 · {tool.storage || "10 meses almacenada"}</div></div>
              <div style={{ color: T.textSecondary, fontSize: 13 }}>{tool.country}</div>
            </div>
          </div>
          <div style={{ width: 340, background: T.level1, borderRadius: 14, padding: 20, flexShrink: 0 }}>
            <div style={{ color: "#fff", fontSize: 15, fontWeight: 600, marginBottom: 14 }}>Información de la herramienta</div>
            <div style={{ background: T.bg, borderRadius: 10, padding: 14, fontSize: 13 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}><span style={{ color: T.textMuted }}>Serial</span><span style={{ color: "#fff" }}>{tool.serial}</span></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.textMuted }}>SKU .bord</span><span style={{ color: "#fff" }}>8532R3RH38W</span></div>
            </div>
            <div style={{ color: T.textMuted, fontSize: 13, margin: "18px 0 10px" }}>Adquisición</div>
            <div style={{ fontSize: 13 }}>
              <Row k="Proveedor" v={<span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: T.primary }} /> .bord</span>} />
              <Row k="Número de orden .bord" v={<span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>1526 {Icons.external(13)}</span>} />
              <Row k="Orden de compra (PO)" v={<span style={{ color: T.primary, display: "inline-flex", alignItems: "center", gap: 4 }}>Agregar {Icons.plus(13)}</span>} />
            </div>
            <div style={{ color: T.textMuted, fontSize: 13, margin: "18px 0 10px" }}>Estado de la herramienta</div>
            <Row k="Estado físico" v={<span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>Excelente {Icons.chevDown(13)}</span>} />
            <div style={{ textAlign: "center", padding: "24px 0", color: T.textMuted }}><div style={{ marginBottom: 8, display: "flex", justifyContent: "center", color: T.primary }}>{Icons.settings(30)}</div><div style={{ color: "#fff", fontWeight: 600, fontSize: 13 }}>No se han aplicado servicios adicionales</div></div>
          </div>
        </div>
      </div>
    </div>
  );
}

function InventoryScreen({ onOpenDetail, startSell }) {
  const [selectionMode, setSelectionMode] = useState(false);
  const [entering, setEntering] = useState(false);
  const [selected, setSelected] = useState({});
  const [bbxHover, setBbxHover] = useState(false);
  const [modal, setModal] = useState(null);
  const [openFilter, setOpenFilter] = useState(null);
  const [activeFilters, setActiveFilters] = useState({ tipo: "Laptops" });

  useEffect(() => { if (startSell) { setSelected({ [startSell]: true }); setSelectionMode(true); setModal("confirm"); } }, [startSell]);

  const eligibleExist = INVENTORY.some((t) => t.eligible && !t.activeBBX);
  const grouped = useMemo(() => Object.fromEntries(COUNTRY_ORDER.map((c) => [c, INVENTORY.filter((t) => t.country === c)])), []);
  const selectedTools = INVENTORY.filter((t) => selected[t.id]);
  const selectedCountries = COUNTRY_ORDER.filter((c) => selectedTools.some((t) => t.country === c));
  const selectedGrouped = Object.fromEntries(selectedCountries.map((c) => [c, selectedTools.filter((t) => t.country === c)]));
  const selCount = selectedTools.length;

  const toggle = (id) => setSelected((s) => ({ ...s, [id]: !s[id] }));
  const enter = () => {
    if (!eligibleExist) return;
    setSelected({});                 // nunca preseleccionar
    setSelectionMode(true);
    setEntering(true);
    setTimeout(() => setEntering(false), 30);  // dispara la transición de entrada
  };
  const cancel = () => { setSelectionMode(false); setSelected({}); };
  const toggleCountry = (c) => {
    const ids = grouped[c].filter((t) => t.eligible && !t.activeBBX).map((t) => t.id);
    const allOn = ids.length > 0 && ids.every((id) => selected[id]);
    setSelected((s) => { const n = { ...s }; ids.forEach((id) => { n[id] = !allOn; }); return n; });
  };

  /* ---- BUYBACK MODE ---- */
  if (selectionMode) {
    return (
      <div style={{ flex: 1, display: "flex", flexDirection: "column", position: "relative", minWidth: 0 }}>
        <TopHeader kind="inventory" />
        <div style={{ flex: 1, overflowY: "auto", padding: "24px 28px 60px", opacity: entering ? 0 : 1, transform: entering ? "translateY(12px)" : "translateY(0)", transition: "opacity .35s ease, transform .35s ease" }}>
          <BuybackFilters openFilter={openFilter} setOpenFilter={setOpenFilter} activeFilters={activeFilters} setActiveFilters={setActiveFilters} onCancel={cancel} />
          <BuybackBanner count={selCount} onQuote={() => setModal("confirm")} />
          {COUNTRY_ORDER.map((c) => {
            const eligibles = grouped[c].filter((t) => t.eligible && !t.activeBBX);
            if (eligibles.length === 0) return null;
            const allOn = eligibles.every((t) => selected[t.id]);
            return (
              <div key={c} style={{ marginBottom: 8 }}>
                <BuybackCountryHeader country={c} count={eligibles.length} checked={allOn} onToggle={() => toggleCountry(c)} />
                {eligibles.map((t) => <BuybackCard key={t.id} tool={t} selected={!!selected[t.id]} onToggle={toggle} />)}
              </div>
            );
          })}
        </div>
        {modal === "confirm" && <ConfirmModal countries={selectedCountries} grouped={selectedGrouped} onClose={() => setModal(null)} onEdit={() => setModal(null)} onSend={() => setModal("success")} />}
        {modal === "success" && <SuccessModal countries={selectedCountries} grouped={selectedGrouped} onClose={() => { setModal(null); cancel(); }} />}
      </div>
    );
  }

  /* ---- DEFAULT LISTING ---- */
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", position: "relative", minWidth: 0 }}>
      <TopHeader kind="inventory" />
      <div style={{ flex: 1, overflowY: "auto", padding: "24px 28px 60px" }}>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 24, gap: 16 }}>
          <FilterBar selectionMode={false} />
          <div style={{ marginLeft: "auto", display: "flex", gap: 12, alignItems: "center" }}>
            <div style={{ background: T.level1, border: `1px solid ${T.stroke}`, borderRadius: 10, padding: "9px 16px", color: T.textSecondary, fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>CSV {Icons.download(16)}</div>
            <div style={{ background: T.level1, border: `1px solid ${T.stroke}`, borderRadius: 10, padding: "9px 16px", color: "#fff", fontSize: 14, display: "flex", alignItems: "center", gap: 8, whiteSpace: "nowrap" }}>Cargar inventario {Icons.plus(16)}</div>
            <div style={{ position: "relative" }} onMouseEnter={() => setBbxHover(true)} onMouseLeave={() => setBbxHover(false)}>
              <button onClick={enter} disabled={!eligibleExist} style={{ background: T.level2, border: "none", borderRadius: 10, padding: "9px 16px", display: "flex", alignItems: "center", gap: 8, color: eligibleExist ? "#fff" : T.textMuted, fontFamily: FONT, fontSize: 14, cursor: eligibleExist ? "pointer" : "not-allowed", opacity: eligibleExist ? 1 : .6 }}>
                <span style={{ color: T.purple, display: "inline-flex" }}>{Icons.bbx(18)}</span> Buyback <span style={{ background: T.purple, color: "#fff", fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 24 }}>Nuevo</span>
              </button>
              {!eligibleExist && bbxHover && <div style={{ position: "absolute", top: "115%", right: 0, background: T.level2, border: `1px solid ${T.stroke}`, borderRadius: 8, padding: "10px 14px", fontSize: 12, color: T.textSecondary, width: 230, zIndex: 20 }}>No tienes herramientas disponibles en bodega para vender a Bord</div>}
            </div>
          </div>
        </div>

        <div style={{ color: "#fff", fontSize: 15, fontWeight: 600, margin: "4px 0 14px" }}>Disponible ({INVENTORY.length})</div>
        {INVENTORY.map((t) => <ToolRow key={t.id} tool={t} selectionMode={false} selected={false} selectable={t.eligible && !t.activeBBX} onToggle={toggle} onOpen={onOpenDetail} />)}
      </div>

      {modal === "confirm" && <ConfirmModal countries={selectedCountries} grouped={selectedGrouped} onClose={() => setModal(null)} onEdit={() => setModal(null)} onSend={() => setModal("success")} />}
      {modal === "success" && <SuccessModal countries={selectedCountries} grouped={selectedGrouped} onClose={() => { setModal(null); cancel(); }} />}
    </div>
  );
}

function App() {
  useDMSans();
  const [view, setView] = useState("home");
  const [detailTool, setDetailTool] = useState(null);
  const [sellId, setSellId] = useState(null);

  const nav = (label) => {
    if (label === "Home") setView("home");
    else if (label === "Inventario") { setSellId(null); setView("inventory"); }
  };

  return (
    <div style={{ display: "flex", height: "100vh", background: T.bg, fontFamily: FONT, color: T.textPrimary, overflow: "hidden" }}>
      <Sidebar active={view === "home" ? "Home" : "Inventario"} onNav={nav} />
      {view === "home" && <HomeScreen onGoInventory={() => { setSellId(null); setView("inventory"); }} />}
      {view === "inventory" && <InventoryScreen startSell={sellId} onOpenDetail={(t) => { setDetailTool(t); setView("detail"); }} />}
      {view === "detail" && <DetailScreen tool={detailTool} onSell={(t) => { setSellId(t.id); setView("inventory"); }} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
